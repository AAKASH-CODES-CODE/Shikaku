<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A" />
      <stop offset="50%" stop-color="#121829" />
      <stop offset="100%" stop-color="#1A233D" />
    </linearGradient>

    <!-- Border Accent Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.8" />
    </linearGradient>

    <!-- Neon Cyan Gradient -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>

    <!-- Neon Rose Gradient -->
    <linearGradient id="rose-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>

    <!-- Glow filters for ultra-polished feel -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-rose" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Squircle App Icon Container -->
  <rect x="12" y="12" width="488" height="488" rx="112" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="6" />

  <!-- Grid Area Background (subtle inner container) -->
  <rect x="64" y="64" width="384" height="384" rx="40" fill="#060814" fill-opacity="0.6" stroke="#1E293B" stroke-width="2" />

  <!-- Puzzle Grid Lines -->
  <!-- Columns -->
  <line x1="160" y1="64" x2="160" y2="448" stroke="#1E293B" stroke-width="3" stroke-dasharray="2 4" />
  <line x1="256" y1="64" x2="256" y2="448" stroke="#1E293B" stroke-width="3" stroke-dasharray="2 4" />
  <line x1="352" y1="64" x2="352" y2="448" stroke="#1E293B" stroke-width="3" stroke-dasharray="2 4" />

  <!-- Rows -->
  <line x1="64" y1="160" x2="448" y2="160" stroke="#1E293B" stroke-width="3" stroke-dasharray="2 4" />
  <line x1="64" y1="256" x2="448" y2="256" stroke="#1E293B" stroke-width="3" stroke-dasharray="2 4" />
  <line x1="64" y1="352" x2="448" y2="352" stroke="#1E293B" stroke-width="3" stroke-dasharray="2 4" />

  <!-- Highlighted Rectangle 1: Neon Cyan (2x1 Rectangle, Top Right) -->
  <!-- Spans x=160 to x=352, y=64 to y=160. Contains number "2" in cell (160, 64) -->
  <rect x="166" y="70" width="180" height="84" rx="14" fill="url(#cyan-grad)" fill-opacity="0.12" stroke="#38BDF8" stroke-width="6" filter="url(#glow-cyan)" />
  <circle cx="208" cy="112" r="18" fill="#0C1428" stroke="#0284C7" stroke-width="2" />
  <text x="208" y="118" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="18" fill="#38BDF8" text-anchor="middle">2</text>

  <!-- Highlighted Rectangle 2: Neon Rose (2x2 Square, Bottom Left) -->
  <!-- Spans x=160 to x=352, y=256 to y=448. Contains number "4" in cell (256, 352) -->
  <rect x="166" y="262" width="180" height="180" rx="18" fill="url(#rose-grad)" fill-opacity="0.12" stroke="#F43F5E" stroke-width="6" filter="url(#glow-rose)" />
  <circle cx="304" cy="400" r="18" fill="#1A0D18" stroke="#BE123C" stroke-width="2" />
  <text x="304" y="406" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="18" fill="#F43F5E" text-anchor="middle">4</text>

  <!-- Glowing Aesthetic Accent Core (Center Node) -->
  <circle cx="256" cy="208" r="4" fill="#60A5FA" />
</svg>
